    <!-- Node-globals polyfill for mqtt.js in the browser (must run before the bundle) -->
    <script>
      window.global = window.global || window;
      window.process = window.process || { env: {}, version: "", nextTick: function (cb) { setTimeout(cb, 0); } };
      if (typeof globalThis.Buffer === "undefined") {
        window.Buffer = { isBuffer: function () { return false; } };
      }
    </script>
